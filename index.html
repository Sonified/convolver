<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convolver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Convolver</h1>
    <p class="subtitle">Drop two audio files, convolve, listen.</p>

    <div class="workspace">
        <!-- Left: Signal A -->
        <div class="panel">
            <h2>Signal A</h2>
            <div class="drop-zone" id="dropA">
                <div class="icon">🎵</div>
                <div class="label">Drop audio or click to browse</div>
                <div class="filename" id="nameA"></div>
                <input type="file" accept="audio/*" hidden id="fileA">
            </div>
            <canvas class="waveform" id="waveA"></canvas>
            <button class="play-btn" id="playA" disabled>&#9654; Play</button>
        </div>

        <!-- Center: Controls -->
        <div class="controls">
            <div class="operator">*</div>
            <button class="primary" id="convolveBtn" disabled>Convolve</button>
        </div>

        <!-- Right: Signal B -->
        <div class="panel">
            <h2>Signal B</h2>
            <div class="drop-zone" id="dropB">
                <div class="icon">🔊</div>
                <div class="label">Drop audio or click to browse</div>
                <div class="filename" id="nameB"></div>
                <input type="file" accept="audio/*" hidden id="fileB">
            </div>
            <canvas class="waveform" id="waveB"></canvas>
            <button class="play-btn" id="playB" disabled>&#9654; Play</button>
        </div>

        <!-- Result -->
        <div class="panel result-panel" id="resultPanel">
            <h2>Result (A * B)</h2>
            <div class="result-inner">
                <div>
                    <canvas class="waveform" id="waveR"></canvas>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="playR" disabled>&#9654; Play</button>
                    <button id="downloadR" disabled>&#11015; Download WAV</button>
                </div>
            </div>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
