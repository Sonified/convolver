<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convolution Explorer</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --border: #333;
            --accent: #22d3ee;
            --accent-rgb: 34, 211, 238;
            --text: #e0e0e0;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 1.5rem;
            align-items: start;
            width: 100%;
            max-width: 1200px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .panel h2 {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(var(--accent-rgb), 0.05);
        }

        .drop-zone.loaded {
            border-color: rgba(var(--accent-rgb), 0.3);
            border-style: solid;
        }

        .drop-zone .icon { font-size: 2rem; }
        .drop-zone .label { font-size: 0.85rem; color: var(--text-dim); }
        .drop-zone .filename {
            font-size: 0.8rem;
            color: var(--accent);
            word-break: break-all;
        }

        canvas.waveform {
            width: 100%;
            height: 80px;
            margin-top: 1rem;
            border-radius: 4px;
            background: #111;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding-top: 2rem;
        }

        button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        button.primary {
            background: rgba(var(--accent-rgb), 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 500;
            padding: 0.8rem 2rem;
            font-size: 1rem;
        }

        button.primary:hover:not(:disabled) {
            background: rgba(var(--accent-rgb), 0.25);
        }

        .play-btn { font-size: 0.8rem; margin-top: 0.5rem; }

        .result-panel {
            grid-column: 1 / -1;
            display: none;
        }

        .result-panel.visible { display: block; }

        .result-inner {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: center;
        }

        .status {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-align: center;
            margin-top: 0.5rem;
        }

        .operator {
            font-size: 2rem;
            color: var(--text-dim);
            font-weight: 200;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
            .controls { flex-direction: row; padding-top: 0; }
            .operator { display: none; }
            .result-inner { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>Convolution Explorer</h1>
    <p class="subtitle">Drop two audio files, convolve, listen.</p>

    <div class="workspace">
        <!-- Left: Signal A -->
        <div class="panel">
            <h2>Signal A</h2>
            <div class="drop-zone" id="dropA">
                <div class="icon">🎵</div>
                <div class="label">Drop audio or click to browse</div>
                <div class="filename" id="nameA"></div>
                <input type="file" accept="audio/*" hidden id="fileA">
            </div>
            <canvas class="waveform" id="waveA"></canvas>
            <button class="play-btn" id="playA" disabled>&#9654; Play</button>
        </div>

        <!-- Center: Controls -->
        <div class="controls">
            <div class="operator">*</div>
            <button class="primary" id="convolveBtn" disabled>Convolve</button>
        </div>

        <!-- Right: Signal B (Impulse Response) -->
        <div class="panel">
            <h2>Signal B</h2>
            <div class="drop-zone" id="dropB">
                <div class="icon">🔊</div>
                <div class="label">Drop audio or click to browse</div>
                <div class="filename" id="nameB"></div>
                <input type="file" accept="audio/*" hidden id="fileB">
            </div>
            <canvas class="waveform" id="waveB"></canvas>
            <button class="play-btn" id="playB" disabled>&#9654; Play</button>
        </div>

        <!-- Result -->
        <div class="panel result-panel" id="resultPanel">
            <h2>Result (A * B)</h2>
            <div class="result-inner">
                <div>
                    <canvas class="waveform" id="waveR"></canvas>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="playR" disabled>&#9654; Play</button>
                    <button id="downloadR" disabled>⬇ Download WAV</button>
                </div>
            </div>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const state = { a: null, b: null, result: null, playing: null };

        // --- Drop zone logic ---
        function setupDrop(dropId, fileId, nameId, waveId, playId, key) {
            const drop = document.getElementById(dropId);
            const fileInput = document.getElementById(fileId);
            const nameEl = document.getElementById(nameId);
            const canvas = document.getElementById(waveId);
            const playBtn = document.getElementById(playId);

            drop.addEventListener('click', () => fileInput.click());
            drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
            drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
            drop.addEventListener('drop', e => {
                e.preventDefault();
                drop.classList.remove('dragover');
                if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
            });
            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) handleFile(fileInput.files[0]);
            });

            async function handleFile(file) {
                nameEl.textContent = file.name;
                drop.classList.add('loaded');
                drop.querySelector('.label').textContent = 'Loaded';

                const arrayBuf = await file.arrayBuffer();
                const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
                state[key] = audioBuf;

                drawWaveform(canvas, audioBuf);
                playBtn.disabled = false;
                checkReady();
            }

            playBtn.addEventListener('click', () => playBuffer(state[key], playBtn));
        }

        setupDrop('dropA', 'fileA', 'nameA', 'waveA', 'playA', 'a');
        setupDrop('dropB', 'fileB', 'nameB', 'waveB', 'playB', 'b');

        // --- Waveform drawing ---
        function drawWaveform(canvas, buffer) {
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.clientWidth * dpr;
            canvas.height = canvas.clientHeight * dpr;
            ctx.scale(dpr, dpr);

            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            const data = buffer.getChannelData(0);
            const step = Math.max(1, Math.floor(data.length / w));

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = 'rgba(34, 211, 238, 0.7)';
            ctx.lineWidth = 1;
            ctx.beginPath();

            for (let i = 0; i < w; i++) {
                const idx = i * step;
                let min = 1, max = -1;
                for (let j = 0; j < step && idx + j < data.length; j++) {
                    const v = data[idx + j];
                    if (v < min) min = v;
                    if (v > max) max = v;
                }
                const y1 = ((1 - max) / 2) * h;
                const y2 = ((1 - min) / 2) * h;
                ctx.moveTo(i, y1);
                ctx.lineTo(i, y2);
            }
            ctx.stroke();
        }

        // --- Playback ---
        function playBuffer(buffer, btn) {
            if (state.playing) {
                state.playing.stop();
                state.playing = null;
            }
            if (!buffer) return;
            audioCtx.resume();
            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            src.connect(audioCtx.destination);
            src.start();
            state.playing = src;
            btn.textContent = '⏹ Stop';
            src.onended = () => { btn.textContent = '▶ Play'; state.playing = null; };
        }

        // --- Convolution ---
        function checkReady() {
            document.getElementById('convolveBtn').disabled = !(state.a && state.b);
        }

        document.getElementById('convolveBtn').addEventListener('click', async () => {
            const btn = document.getElementById('convolveBtn');
            const statusEl = document.getElementById('status');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            statusEl.textContent = '';

            // Use OfflineAudioContext for rendering
            const lengthA = state.a.length;
            const lengthB = state.b.length;
            const outLength = lengthA + lengthB - 1;
            const sampleRate = state.a.sampleRate;

            const offline = new OfflineAudioContext(1, outLength, sampleRate);

            // If signal B needs resampling to match A's sample rate, the ConvolverNode handles it
            const convolver = offline.createConvolver();
            convolver.normalize = false;
            convolver.buffer = state.b;
            convolver.connect(offline.destination);

            const source = offline.createBufferSource();
            source.buffer = state.a;
            source.connect(convolver);
            source.start(0);

            const t0 = performance.now();
            const rendered = await offline.startRendering();
            const elapsed = ((performance.now() - t0) / 1000).toFixed(2);

            state.result = rendered;

            // Show result
            const panel = document.getElementById('resultPanel');
            panel.classList.add('visible');
            drawWaveform(document.getElementById('waveR'), rendered);
            document.getElementById('playR').disabled = false;
            document.getElementById('downloadR').disabled = false;
            statusEl.textContent = `Convolved in ${elapsed}s | ${rendered.length} samples | ${(rendered.duration).toFixed(2)}s`;

            btn.textContent = 'Convolve';
            btn.disabled = false;
        });

        document.getElementById('playR').addEventListener('click', () => {
            playBuffer(state.result, document.getElementById('playR'));
        });

        // --- WAV Download ---
        document.getElementById('downloadR').addEventListener('click', () => {
            if (!state.result) return;
            const buf = state.result;
            const ch = buf.getChannelData(0);

            // Find peak for normalization
            let peak = 0;
            for (let i = 0; i < ch.length; i++) {
                const abs = Math.abs(ch[i]);
                if (abs > peak) peak = abs;
            }
            const gain = peak > 0 ? 0.95 / peak : 1;

            const numSamples = ch.length;
            const wavBuf = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(wavBuf);

            function writeStr(offset, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }

            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // mono
            view.setUint32(24, buf.sampleRate, true);
            view.setUint32(28, buf.sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, numSamples * 2, true);

            for (let i = 0; i < numSamples; i++) {
                const s = Math.max(-1, Math.min(1, ch[i] * gain));
                view.setInt16(44 + i * 2, s * 32767, true);
            }

            const blob = new Blob([wavBuf], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'convolution-result.wav';
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
